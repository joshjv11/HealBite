services:
  - type: web
    name: poshanpal-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard (MongoDB Atlas URI)
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://poshanpal.vercel.app
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
